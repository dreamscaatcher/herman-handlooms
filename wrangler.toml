name = "harman-handloom"
main = ".open-next/worker.js"
compatibility_date = "2026-04-23"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "harman-db"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"
